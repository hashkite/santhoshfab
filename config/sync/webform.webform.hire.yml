id: hire
title: Hire
description: ''
categories: {  }
elements: |-
  first_page:
    '#type': webform_wizard_page
    '#title': 'Hire Talent'
    '#next_button_label': 'Get Started'
    position:
      '#type': webform_entity_radios
      '#title': 'Let’s chose the role you’d like to hire:'
      '#required': true
      '#target_type': taxonomy_term
      '#selection_handler': 'default:taxonomy_term'
      '#selection_settings':
        target_bundles:
          positions: positions
        sort:
          field: name
          direction: asc
    wrapper:
      '#type': fieldset
      '#title': Wrapper
      '#title_display': invisible
      '#states':
        visible:
          ':input[name="position"]':
            value: '38'
      '#attributes':
        class:
          - skills-wrapper
      most_popular:
        '#type': webform_entity_checkboxes
        '#title': 'Most Popular'
        '#description': '<p>Select at least one skill</p>'
        '#states':
          required:
            ':input[name="position"]':
              value: '38'
        '#wrapper_attributes':
          class:
            - most-popular
        '#target_type': taxonomy_term
        '#selection_handler': views
        '#selection_settings':
          view:
            view_name: most_popular
            display_name: entity_reference_1
            arguments: {  }
      select_other_skills:
        '#type': webform_entity_select
        '#title': 'Select other skills'
        '#multiple': true
        '#placeholder': 'Enter other skills'
        '#select2': true
        '#wrapper_attributes':
          class:
            - other-skills
        '#target_type': taxonomy_term
        '#selection_handler': views
        '#selection_settings':
          view:
            view_name: most_popular
            display_name: other_technologies
            arguments: {  }
    flexbox:
      '#type': webform_flexbox
      '#attributes':
        class:
          - email-phone
      work_email:
        '#type': email
        '#title': 'Work Email'
        '#placeholder': 'Work Email'
        '#required': true
        '#pattern': '^(?!.*@(?:gmail|googlemail)\.com$)[a-zA-Z0-9]+(\.[a-zA-Z0-9]+)*@[a-zA-Z0-9]+(\.[a-zA-Z0-9]+)*\.[a-zA-Z]{2,}$'
        '#pattern_error': 'Please mention your valid work email.'
      phone:
        '#type': tel
        '#title': Phone
        '#required': true
        '#default_value': '+1'
        '#international': true
  second_page:
    '#type': webform_wizard_page
    '#title': Info
    '#next_button_label': 'Request a Call'
    workload_requirement:
      '#type': radios
      '#title': 'Workload requirement'
      '#options':
        'Part Time': 'Part Time'
        'Full Time': 'Full Time'
      '#required': true
    company_size:
      '#type': radios
      '#title': 'Company Size'
      '#options':
        1-10: 1-10
        11-50: 11-50
        51250: '51250'
        251-10K: 251-10K
        10K+: 10K+
  book_a_call:
    '#type': webform_wizard_page
    '#title': 'Book a call'
    book_a_call_field:
      '#type': webform_booking
      '#title': 'Book a call'
      '#excluded_weekdays':
        Sat: Sat
        Sun: Sun
        Mon: 0
        Tue: 0
        Wed: 0
        Thu: 0
        Fri: 0
      '#time_interval': '9:00|18:00'
      '#slot_duration': '30'
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': 'Request a Call'
    '#wizard_prev_hide': true
