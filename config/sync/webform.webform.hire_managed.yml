id: hire_managed
title: 'Hire Managed Teams'
description: ''
categories: {  }
elements: |-
  first_page:
    '#type': webform_wizard_page
    '#title': 'Let’s build you a Managed team'
    '#next_button_label': 'Get Started'
    processed_text_01:
      '#type': processed_text
      '#wrapper_attributes':
        class:
          - page-title
      '#text': '<h2>Let’s build you a Managed team</h2>'
      '#format': basic_html
    processed_text:
      '#type': processed_text
      '#wrapper_attributes':
        class:
          - info-text
      '#text': '<p>Your dedicated team starts with a conversation with our industry leading experts. Delivery Manager and Project Manager, who provide industry expertise. They’ll enlist the tech leads, developers, and other talent needed for your success.</p>'
      '#format': basic_html
    wrapper:
      '#type': webform_flexbox
      '#title': Wrapper
      '#title_display': invisible
      '#attributes':
        class:
          - email-phone
      work_email:
        '#type': email
        '#title': ' Work Email'
        '#placeholder': 'Work Email'
        '#required': true
        '#pattern': '^(?!.*@(?:gmail|googlemail)\.com$)[a-zA-Z0-9]+(\.[a-zA-Z0-9]+)*@[a-zA-Z0-9]+(\.[a-zA-Z0-9]+)*\.[a-zA-Z]{2,}$'
        '#pattern_error': 'Please mention your valid work email.'
      phone:
        '#type': tel
        '#title': Phone
        '#required': true
        '#default_value': '+1'
        '#international': true
  second_page:
    '#type': webform_wizard_page
    '#title': Info
    '#next_button_label': 'Request a Call'
    workload_requirement:
      '#type': radios
      '#title': 'Workload requirement'
      '#options':
        'Part Time': 'Part Time'
        'Full Time': 'Full Time'
      '#required': true
    prefered_technology:
      '#type': webform_entity_select
      '#title': 'Prefered technology (optional)'
      '#empty_option': 'Choose team'
      '#target_type': node
      '#selection_handler': 'default:node'
      '#selection_settings':
        target_bundles:
          sub_service: sub_service
    company_size:
      '#type': radios
      '#title': 'Company Size'
      '#options':
        1-10: 1-10
        11-50: 11-50
        51250: '51250'
        251-10K: 251-10K
        10K+: 10K+
    wrap:
      '#type': webform_flexbox
      '#title': Wrap
      '#title_display': invisible
      '#attributes':
        class:
          - email-phone
      name:
        '#type': textfield
        '#title': Name
        '#placeholder': 'Your Name'
        '#required': true
      your_company:
        '#type': textfield
        '#title': 'Your Company'
        '#placeholder': 'Your Company'
        '#required': true
  book_a_call:
    '#type': webform_wizard_page
    '#title': 'Book a call'
    book_a_call_field:
      '#type': webform_booking
      '#title': 'Book a call'
      '#excluded_weekdays':
        Sat: Sat
        Sun: Sun
        Mon: 0
        Tue: 0
        Wed: 0
        Thu: 0
        Fri: 0
      '#time_interval': '9:00|18:00'
      '#slot_duration': '30'
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': 'Request a Call'
    '#wizard_prev_hide': true
